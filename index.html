<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
    <header>
        <button id="toggleBackgroundBtn" title="Change Background">
            <i class="fas fa-palette"></i>
        </button>
    </header>

    <div class="map-background">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14707.635785602346!2d-43.281157!3d-22.842858!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sbr!4v1757437112482!5m2!1sen!2sbr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <main>
        <section class="weather-container container">
            <h1>Weather</h1>
            <input type="text" id="locationInput" placeholder="Enter a city">
            <button id="searchButton">Search</button>
            <div class="weather-info">
                <h2 id="location"></h2>
                <p id="temperature"></p>
                <p id="description"></p>
            </div>

        </section>
    </main>

    <footer>
        <p>© 2025 Emelly B Muniz. All rights reserved.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
