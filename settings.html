<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WeatherDash Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      const theme = localStorage.getItem("weatherDashTheme") || "light";
      if (theme === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "var(--color-primary)",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .active-nav {
        background-color: color-mix(
          in srgb,
          var(--color-primary),
          transparent 90%
        );
        color: var(--color-primary);
        border-right: 3px solid var(--color-primary);
      }
      :root {
        --color-primary: #2b8cee;
      }
      .active-accent {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div class="flex flex-col h-screen overflow-hidden">
      <header
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4"
      >
        <div class="flex items-center gap-4">
          <a
            href="index.html"
            class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100"
            title="Voltar"
          >
            <span class="material-symbols-outlined">arrow_back</span>
          </a>
          <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
              Settings
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">
              Manage your preferences and saved locations.
            </p>
          </div>
        </div>
      </header>

      <main
        class="flex-1 overflow-y-auto bg-background-light dark:bg-background-dark p-8 lg:p-12"
      >
        <div class="max-w-4xl mx-auto">
          <div class="space-y-12">
            <!-- Managed Saved Locations Section -->
            <section>
              <div class="flex items-center justify-between mb-6">
                <div class="flex flex-col">
                  <h3 class="text-xl font-bold text-slate-900 dark:text-white">
                    Saved Locations
                  </h3>
                  <p class="text-sm text-slate-500 dark:text-slate-400">
                    Drag to reorder your favorite cities.
                  </p>
                </div>
                <button
                  class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition-all"
                >
                  <span class="material-symbols-outlined text-sm">add</span>
                  Add City
                </button>
              </div>
              <div
                class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800"
                id="savedLocationsContainer"
              ></div>
            </section>
            <!-- Appearance Section -->
            <section>
              <div class="flex flex-col mb-6">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white">
                  Appearance
                </h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">
                  Choose how WeatherDash looks for you.
                </p>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Theme Selection -->
                <div
                  class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm"
                >
                  <label
                    class="text-sm font-semibold text-slate-700 dark:text-slate-300 block mb-4"
                    >Interface Theme</label
                  >
                  <div
                    class="flex p-1 bg-background-light dark:bg-slate-800 rounded-lg w-fit"
                  >
                    <button
                      class="theme-toggle flex items-center gap-2 px-6 py-2 bg-white dark:bg-slate-700 shadow-sm rounded-md text-slate-900 dark:text-white font-medium transition-all"
                    >
                      <span class="material-symbols-outlined text-primary"
                        >light_mode</span
                      >
                      Light
                    </button>
                    <button
                      class="theme-toggle flex items-center gap-2 px-6 py-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 font-medium transition-all"
                    >
                      <span class="material-symbols-outlined">dark_mode</span>
                      Dark
                    </button>
                  </div>
                </div>
                <!-- Unit System Selection -->
                <div
                  class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm"
                >
                  <label
                    class="text-sm font-semibold text-slate-700 dark:text-slate-300 block mb-4"
                    >Unit System</label
                  >
                  <div
                    class="flex p-1 bg-background-light dark:bg-slate-800 rounded-lg w-fit"
                  >
                    <button
                      id="metricBtn"
                      class="flex items-center gap-2 px-6 py-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 font-medium transition-all"
                    >
                      Metric (°C)
                    </button>
                    <button
                      id="imperialBtn"
                      class="flex items-center gap-2 px-6 py-2 bg-white dark:bg-slate-700 shadow-sm rounded-md text-slate-900 dark:text-white font-medium transition-all"
                    >
                      Imperial (°F)
                    </button>
                  </div>
                </div>
              </div>
              <!-- Accent Color Selection -->
              <div
                class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm mt-6"
              >
                <label
                  class="text-sm font-semibold text-slate-700 dark:text-slate-300 block mb-4"
                  >Accent Color</label
                >
                <div class="flex flex-wrap gap-4">
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#2b8cee] transition-transform hover:scale-110"
                    data-color="#2b8cee"
                    title="Ocean Blue"
                  ></button>
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#22c55e] transition-transform hover:scale-110"
                    data-color="#22c55e"
                    title="Emerald Green"
                  ></button>
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#eab308] transition-transform hover:scale-110"
                    data-color="#eab308"
                    title="Sun Yellow"
                  ></button>
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#ef4444] transition-transform hover:scale-110"
                    data-color="#ef4444"
                    title="Coral Red"
                  ></button>
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#a855f7] transition-transform hover:scale-110"
                    data-color="#a855f7"
                    title="Violet Purple"
                  ></button>
                  <button
                    class="accent-btn w-10 h-10 rounded-full bg-[#14b8a6] transition-transform hover:scale-110"
                    data-color="#14b8a6"
                    title="Teal"
                  ></button>
                </div>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>

    <script>
      // --- Unidade de temperatura ---
      function getUnitPreference() {
        const stored = localStorage.getItem("weatherDashUnit");
        if (stored) return stored;
        return navigator.language === "en-US" ? "imperial" : "metric";
      }
      function setUnitPreference(unit) {
        localStorage.setItem("weatherDashUnit", unit);
      }
      function updateUnitButtons(unit) {
        const metricBtn = document.getElementById("metricBtn");
        const imperialBtn = document.getElementById("imperialBtn");
        if (!metricBtn || !imperialBtn) return;
        if (unit === "metric") {
          metricBtn.classList.add(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "rounded-md",
            "text-slate-900",
            "dark:text-white",
          );
          metricBtn.classList.remove(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
          imperialBtn.classList.remove(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "rounded-md",
            "text-slate-900",
            "dark:text-white",
          );
          imperialBtn.classList.add(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
        } else {
          imperialBtn.classList.add(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "rounded-md",
            "text-slate-900",
            "dark:text-white",
          );
          imperialBtn.classList.remove(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
          metricBtn.classList.remove(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "rounded-md",
            "text-slate-900",
            "dark:text-white",
          );
          metricBtn.classList.add(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
        }
      }
      document.addEventListener("DOMContentLoaded", () => {
        // Unit Temperatures
        updateUnitButtons(getUnitPreference());
        document.getElementById("metricBtn").addEventListener("click", () => {
          setUnitPreference("metric");
          updateUnitButtons("metric");
        });
        document.getElementById("imperialBtn").addEventListener("click", () => {
          setUnitPreference("imperial");
          updateUnitButtons("imperial");
        });
      });

      function loadSavedLocations() {
        const saved = localStorage.getItem("savedLocations");
        return saved ? JSON.parse(saved) : [];
      }

      function saveSavedLocations(locations) {
        localStorage.setItem("savedLocations", JSON.stringify(locations));
      }

      function renderSavedLocations() {
        const container = document.getElementById("savedLocationsContainer");
        const locations = loadSavedLocations();

        if (locations.length === 0) {
          container.innerHTML =
            '<div class="p-6 text-center text-slate-500"><p>No saved locations yet</p></div>';
          return;
        }

        container.innerHTML = locations
          .map((location, index) => {
            const isImperial = getUnitPreference() === "imperial";
            let displayTemp = location.temperature;
            // If specific C and F data exists, use current preference
            if (
              location.temp_c !== undefined &&
              location.temp_f !== undefined
            ) {
              displayTemp = isImperial
                ? Math.round(location.temp_f)
                : Math.round(location.temp_c);
            }
            return `
          <div class="location-item flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors" draggable="true" data-index="${index}">
            <div class="flex items-center gap-4 flex-1">
              <div class="cursor-grab text-slate-400 hover:text-primary transition-colors drag-handle">
                <span class="material-symbols-outlined">drag_indicator</span>
              </div>
              <div class="w-10 h-10 rounded-lg flex items-center justify-center text-primary" style="background-color: color-mix(in srgb, var(--color-primary), transparent 90%)">
                <span class="material-symbols-outlined">location_on</span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-slate-900 dark:text-white truncate">${location.name}</p>
              </div>
              <p class="font-semibold text-slate-700 dark:text-slate-300 ml-2">${displayTemp}°</p>
            </div>
            <button class="delete-btn w-9 h-9 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-all ml-2" data-index="${index}">
              <span class="material-symbols-outlined text-xl">delete</span>
            </button>
          </div>
        `;
          })
          .join("");

        document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.preventDefault();
            const index = parseInt(btn.getAttribute("data-index"));
            locations.splice(index, 1);
            saveSavedLocations(locations);
            renderSavedLocations();
          });
        });

        const items = document.querySelectorAll(".location-item");
        let draggedItem = null;

        items.forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            draggedItem = item;
            item.classList.add("opacity-50");
            e.dataTransfer.effectAllowed = "move";
          });

          item.addEventListener("dragend", (e) => {
            item.classList.remove("opacity-50");
            draggedItem = null;
          });

          item.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            if (item !== draggedItem) {
              item.classList.add("border-t-2", "border-primary");
            }
          });

          item.addEventListener("dragleave", (e) => {
            item.classList.remove("border-t-2", "border-primary");
          });

          item.addEventListener("drop", (e) => {
            e.preventDefault();
            item.classList.remove("border-t-2", "border-primary");

            if (item !== draggedItem && draggedItem) {
              const draggedIndex = parseInt(
                draggedItem.getAttribute("data-index"),
              );
              const targetIndex = parseInt(item.getAttribute("data-index"));

              const locations = loadSavedLocations();

              const [movedLocation] = locations.splice(draggedIndex, 1);
              locations.splice(targetIndex, 0, movedLocation);

              saveSavedLocations(locations);
              renderSavedLocations();
            }
          });
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderSavedLocations();
        initThemeToggle();
        loadThemePreference();
        initAccentColor();
      });

      function loadThemePreference() {
        const theme = localStorage.getItem("weatherDashTheme") || "light";
        applyTheme(theme);
        updateThemeButtons(theme);
      }

      function applyTheme(theme) {
        const html = document.documentElement;
        if (theme === "dark") {
          html.classList.add("dark");
        } else {
          html.classList.remove("dark");
        }
        localStorage.setItem("weatherDashTheme", theme);
      }

      function updateThemeButtons(theme) {
        const lightBtn = document.querySelectorAll(".theme-toggle")[0];
        const darkBtn = document.querySelectorAll(".theme-toggle")[1];

        if (!lightBtn || !darkBtn) return;

        if (theme === "light") {
          lightBtn.classList.add(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "text-slate-900",
            "dark:text-white",
          );
          lightBtn.classList.remove(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
          darkBtn.classList.remove(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "text-slate-900",
            "dark:text-white",
          );
          darkBtn.classList.add(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
        } else {
          darkBtn.classList.add(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "text-slate-900",
            "dark:text-white",
          );
          darkBtn.classList.remove(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
          lightBtn.classList.remove(
            "bg-white",
            "dark:bg-slate-700",
            "shadow-sm",
            "text-slate-900",
            "dark:text-white",
          );
          lightBtn.classList.add(
            "text-slate-500",
            "hover:text-slate-700",
            "dark:hover:text-slate-200",
          );
        }
      }

      function initThemeToggle() {
        const themeButtons = document.querySelectorAll(".theme-toggle");

        themeButtons[0].addEventListener("click", () => {
          applyTheme("light");
          updateThemeButtons("light");
        });

        themeButtons[1].addEventListener("click", () => {
          applyTheme("dark");
          updateThemeButtons("dark");
        });
      }

      // --- Accent Color Logic ---
      function initAccentColor() {
        const buttons = document.querySelectorAll(".accent-btn");
        const currentAccent =
          localStorage.getItem("weatherDashAccent") || "#2b8cee";

        const setAccent = (color) => {
          document.documentElement.style.setProperty("--color-primary", color);
          localStorage.setItem("weatherDashAccent", color);
          buttons.forEach((btn) => {
            if (btn.getAttribute("data-color") === color) {
              btn.classList.add("active-accent", "scale-110");
            } else {
              btn.classList.remove("active-accent", "scale-110");
            }
          });
          if (
            window.tailwind !== undefined &&
            tailwind.config &&
            tailwind.config.theme &&
            tailwind.config.theme.extend &&
            tailwind.config.theme.extend.colors
          ) {
            tailwind.config.theme.extend.colors.primary = color;
          }
          document.body.style.transition = "none";
          document.body.offsetHeight;
          document.body.style.transition = "";
        };

        buttons.forEach((btn) => {
          btn.addEventListener("click", () =>
            setAccent(btn.getAttribute("data-color")),
          );
        });

        setAccent(currentAccent);
      }
    </script>
  </body>
</html>
